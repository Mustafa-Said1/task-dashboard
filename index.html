<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TaskFlow - Premium Task Management Dashboard Login">
  <title>Login | TaskFlow Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dark.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="login-page">
  <!-- Page Loader -->
  <div id="page-loader" class="page-loader" aria-hidden="false" role="status">
    <div class="page-loader__spinner"></div>
    <span class="page-loader__text">Loading TaskFlow...</span>
  </div>

  <!-- Theme Toggle -->
  <button id="theme-toggle" class="theme-toggle login-theme-toggle" aria-label="Toggle dark mode">
    <i class="fa-solid fa-moon" aria-hidden="true"></i>
  </button>

  <main class="login-container" role="main">
    <div class="login-card animate-scale-in">
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo__icon">
          <i class="fa-solid fa-layer-group" aria-hidden="true"></i>
        </div>
        <h1 class="login-logo__text">TaskFlow</h1>
      </div>

      <p class="login-welcome">Welcome back! Sign in to manage your tasks.</p>

      <!-- Login Form -->
      <form id="login-form" class="login-form" novalidate aria-label="Login form">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope input-icon" aria-hidden="true"></i>
            <input type="email" id="email" name="email" class="form-input"
                   placeholder="admin@example.com" autocomplete="email" required
                   aria-describedby="email-error">
          </div>
          <span class="form-error" id="email-error" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon" aria-hidden="true"></i>
            <input type="password" id="password" name="password" class="form-input"
                   placeholder="Enter your password" autocomplete="current-password" required
                   aria-describedby="password-error">
            <button type="button" id="toggle-password" class="input-toggle"
                    aria-label="Show password" tabindex="0">
              <i class="fa-solid fa-eye" aria-hidden="true"></i>
            </button>
          </div>
          <span class="form-error" id="password-error" role="alert"></span>
        </div>

        <div class="login-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me" name="rememberMe">
            <span class="checkbox-custom"></span>
            Remember me
          </label>
          <a href="#" class="login-forgot" tabindex="0">Forgot password?</a>
        </div>

        <button type="submit" id="login-btn" class="btn btn--primary btn--full btn--ripple">
          <span class="btn__text">Sign In</span>
          <span class="btn__loader" hidden>
            <span class="btn-spinner"></span>
          </span>
        </button>
      </form>

      <div class="login-demo">
        <p class="login-demo__title"><i class="fa-solid fa-circle-info" aria-hidden="true"></i> Demo Account</p>
        <p class="login-demo__cred"><strong>Email:</strong> admin@example.com</p>
        <p class="login-demo__cred"><strong>Password:</strong> Admin@123</p>
      </div>
    </div>

    <div class="login-decoration" aria-hidden="true">
      <div class="login-decoration__orb login-decoration__orb--1"></div>
      <div class="login-decoration__orb login-decoration__orb--2"></div>
      <div class="login-decoration__orb login-decoration__orb--3"></div>
    </div>
  </main>

  <div id="toast-container" class="toast-container" role="alert" aria-live="polite"></div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
